name: Bug report
description: Report a problem with claude-mouse-mcp
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Register the server with ...
        2. Ask Claude to ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.8"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Claude Code (CLI)
        - Claude Desktop
        - Codex CLI
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
